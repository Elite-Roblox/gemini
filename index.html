<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إصدار 22</title>
    <style>
        body { 
            background: #000; 
            color: #ff0000; 
            font-family: 'Arial Black', sans-serif;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            flex-direction: column;
        }
        h1 { font-size: 150px; margin: 0; text-shadow: 0 0 20px #f00; }
        p { font-size: 20px; color: #fff; }
    </style>
</head>
<body>

    <p>VERSION ACTIVE:</p>
    <h1>22</h1>
    <p id="status">جاري محاولة الإرسال القسري...</p>

    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function forceEmit() {
            const data = JSON.stringify({
                content: "🔥 **النسخة 22 اشتغلت غصباً عن المتصفح!**\nالجهاز: " + navigator.userAgent
            });

            // الطريقة 1: XHR (الأقوى في الإرسال السريع)
            var xhr = new XMLHttpRequest();
            xhr.open("POST", WEBHOOK, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(data);

            // الطريقة 2: Beacon (لأندرويد 14)
            navigator.sendBeacon(WEBHOOK, data);

            document.getElementById('status').innerText = "تم الإرسال بنجاح!";
        }

        // تنفيذ فوري
        window.onload = forceEmit;
    </script>
</body>
</html>
